name: Build BlockerApp iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout codice
      uses: actions/checkout@v4

    - name: Seleziona Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Info ambiente
      run: |
        xcodebuild -version
        swift --version
        echo "Files nel repo:"
        ls -la

    - name: Verifica struttura progetto
      run: |
        echo "Contenuto xcodeproj:"
        ls BlockerApp.xcodeproj/
        echo "File Swift app:"
        ls BlockerApp/
        echo "File extension:"
        ls CallBlockerExtension/

    - name: Build app + extension (unsigned)
      run: |
        xcodebuild \
          -project BlockerApp.xcodeproj \
          -scheme BlockerApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          ONLY_ACTIVE_ARCH=NO \
          SKIP_INSTALL=NO \
          clean build 2>&1 | tee build_output.txt
        if grep -q "BUILD SUCCEEDED" build_output.txt; then
          echo "BUILD SUCCEEDED"
        else
          echo "BUILD FAILED - ultimi errori:"
          grep -E "error:|BUILD FAILED" build_output.txt | tail -20
          exit 1
        fi

    - name: Verifica output build
      run: |
        echo "=== Prodotti compilati ==="
        find ./build/Build/Products -type d -name "*.app" -o -name "*.appex" | sort
        echo ""
        echo "=== Contenuto BlockerApp.app ==="
        ls -lh ./build/Build/Products/Release-iphoneos/BlockerApp.app/ || echo "App non trovata"

    - name: Incorpora extension nell'app e crea .ipa
      run: |
        APP=./build/Build/Products/Release-iphoneos/BlockerApp.app
        EXTENSION=./build/Build/Products/Release-iphoneos/CallBlockerExtension.appex

        mkdir -p "$APP/PlugIns"

        if [ -d "$EXTENSION" ]; then
          cp -r "$EXTENSION" "$APP/PlugIns/"
          echo "Extension copiata: $(du -sh $APP/PlugIns/CallBlockerExtension.appex)"
        else
          echo "ATTENZIONE: CallBlockerExtension.appex non trovata, cerco altrove..."
          find ./build -name "*.appex" -type d | head -5
        fi

        echo ""
        echo "=== Struttura finale app ==="
        find "$APP" -type f | sort

        mkdir -p ./output/Payload
        cp -r "$APP" ./output/Payload/
        cd ./output
        zip -r BlockerApp.ipa Payload/
        echo ""
        echo "=== IPA creato ==="
        du -sh BlockerApp.ipa
        unzip -l BlockerApp.ipa | grep -E "appex|\.app" | head -20

    - name: Carica .ipa
      uses: actions/upload-artifact@v4
      with:
        name: BlockerApp-ipa
        path: ./output/BlockerApp.ipa
        retention-days: 30

    - name: Carica log in caso di errore
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          build_output.txt
          ./build/Logs/
        retention-days: 7
