name: Build BlockerApp iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # permette di avviare manualmente dal sito GitHub

jobs:
  build:
    runs-on: macos-latest  # Mac virtuale gratuito di GitHub

    steps:

    # 1. Scarica il codice dal repository
    - name: Checkout codice
      uses: actions/checkout@v4

    # 2. Seleziona la versione di Xcode
    - name: Seleziona Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    # 3. Mostra info ambiente (utile per debug)
    - name: Info ambiente
      run: |
        xcodebuild -version
        swift --version

    # 4. Risolvi le dipendenze (se usi Swift Package Manager)
    - name: Risolvi dipendenze SPM
      run: |
        xcodebuild -resolvePackageDependencies \
          -project BlockerApp.xcodeproj \
          -scheme BlockerApp
      continue-on-error: true  # non blocca se non ci sono dipendenze

    # 5. Build dell'app (senza firma per ora → firma con AltStore/Sideloadly sul PC)
    - name: Build app (unsigned)
      run: |
        xcodebuild \
          -project BlockerApp.xcodeproj \
          -scheme BlockerApp \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -derivedDataPath ./build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          PROVISIONING_PROFILE="" \
          clean build

    # 6. Crea il file .ipa (pacchetto installabile su iPhone)
    - name: Crea file .ipa
      run: |
        mkdir -p ./output/Payload
        cp -r ./build/Build/Products/Release-iphoneos/BlockerApp.app ./output/Payload/
        cd ./output
        zip -r BlockerApp.ipa Payload/
        echo "✅ File .ipa creato con successo"

    # 7. Carica il file .ipa come artefatto scaricabile
    - name: Carica .ipa come artefatto
      uses: actions/upload-artifact@v4
      with:
        name: BlockerApp-ipa
        path: ./output/BlockerApp.ipa
        retention-days: 30  # disponibile per 30 giorni

    # 8. Carica anche i log di build (utile in caso di errori)
    - name: Carica log di build (in caso di errore)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: ./build/Logs/
        retention-days: 7
